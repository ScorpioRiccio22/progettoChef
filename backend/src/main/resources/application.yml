server:
  port: 8080

spring:
  application:
    name: andreamoiochef-backend

  servlet:
    multipart:
      # Alzato per consentire il caricamento di video mp4 (vedi FileStorageService,
      # che applica comunque un limite dedicato di 200MB e valida il content-type).
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:210MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:210MB}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/andreamoiochef}
    username: ${DB_USERNAME:andreamoiochef}
    password: ${DB_PASSWORD:andreamoiochef}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  cors:
    # Origini consentite per le chiamate dal frontend, separate da virgola
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:changeit-dev-secret-please-override-in-prod-min-32-chars}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
    issuer: andreamoiochef-backend
  admin-seed:
    enabled: ${ADMIN_SEED_ENABLED:true}
    email: ${ADMIN_SEED_EMAIL:admin@andreamoiochef.it}
    password: ${ADMIN_SEED_PASSWORD:admin123}
    full-name: ${ADMIN_SEED_FULL_NAME:Andrea Moio}
  storage:
    # Cartella su disco (dentro il container) dove vengono salvate le immagini caricate da admin
    upload-dir: ${UPLOAD_DIR:/app/uploads}
    # Prefisso URL pubblico con cui quei file vengono serviti dal backend stesso
    public-url-prefix: ${UPLOAD_PUBLIC_URL_PREFIX:/uploads}
  google-places:
    # Chiave API "Places API" di Google Cloud. NON va mai messa qui in chiaro:
    # si imposta solo come variabile d'ambiente/secret (vedi backend/README.md),
    # esattamente come app.jwt.secret. Non viene mai restituita da nessun
    # endpoint: il backend la usa solo lato server per interrogare Google.
    api-key: ${GOOGLE_PLACES_API_KEY:}
    # Place ID della scheda Google Business del locale/attività (non è un segreto,
    # si trova con https://developers.google.com/maps/documentation/places/web-service/place-id).
    place-id: ${GOOGLE_PLACES_PLACE_ID:}
    # Per quanti minuti tenere in cache le recensioni prima di richiamare Google di nuovo
    # (le API Places sono a pagamento oltre una soglia: la cache evita di sforare inutilmente).
    cache-minutes: ${GOOGLE_PLACES_CACHE_MINUTES:180}
    # Numero massimo di recensioni da mostrare sul sito
    max-reviews: ${GOOGLE_PLACES_MAX_REVIEWS:6}

logging:
  level:
    root: INFO
    it.andreamoiochef: DEBUG
